name: Deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute image names
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY_OWNER,,}"
          repo="${GITHUB_REPOSITORY#*/}"
          repo="${repo,,}"

          echo "frontend_image=ghcr.io/${owner}/${repo}-frontend" >> "$GITHUB_OUTPUT"
          echo "server_image=ghcr.io/${owner}/${repo}-server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for frontend image
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.frontend_image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=master

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./frontend/Dockerfile
          build-args: |
            VITE_TIANDITU_KEY=${{ secrets.VITE_TIANDITU_KEY }}
          push: true
          tags: ${{ steps.meta-frontend.outputs.tags }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

      - name: Extract metadata for server image
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.meta.outputs.server_image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=master

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Trust deployment host
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FRONTEND_IMAGE: ${{ steps.meta.outputs.frontend_image }}
          SERVER_IMAGE: ${{ steps.meta.outputs.server_image }}
        run: |
          set -euo pipefail

          ghcr_username_b64="$(printf '%s' "${GHCR_USERNAME}" | base64)"
          ghcr_token_b64="$(printf '%s' "${GHCR_TOKEN}" | base64)"
          frontend_image_b64="$(printf '%s' "${FRONTEND_IMAGE}" | base64)"
          server_image_b64="$(printf '%s' "${SERVER_IMAGE}" | base64)"

          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "export GHCR_USERNAME=\$(printf '%s' '${ghcr_username_b64}' | base64 -d); \
             export GHCR_TOKEN=\$(printf '%s' '${ghcr_token_b64}' | base64 -d); \
             export FRONTEND_IMAGE=\$(printf '%s' '${frontend_image_b64}' | base64 -d); \
             export SERVER_IMAGE=\$(printf '%s' '${server_image_b64}' | base64 -d); \
             export IMAGE_TAG='master'; \
             bash /root/strava/deploy.sh"
