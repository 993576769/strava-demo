services:
  server:
    image: ${SERVER_IMAGE:?set SERVER_IMAGE}:${IMAGE_TAG:-master}
    container_name: strava-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8090:8090"
    environment:
      TZ: Asia/Shanghai
      PORT: ${PORT:-8090}
      DATABASE_URL: ${DATABASE_URL:?set DATABASE_URL}
      APP_URL: ${APP_URL:?set APP_URL}
      ACCESS_TOKEN_SECRET: ${ACCESS_TOKEN_SECRET:?set ACCESS_TOKEN_SECRET}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:?set REFRESH_TOKEN_SECRET}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?set GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?set GITHUB_CLIENT_SECRET}
      GITHUB_REDIRECT_URI: ${GITHUB_REDIRECT_URI:-}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID:?set STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET:?set STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: ${STRAVA_REDIRECT_URI:?set STRAVA_REDIRECT_URI}
      STRAVA_STATE_SECRET: ${STRAVA_STATE_SECRET:?set STRAVA_STATE_SECRET}
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN:?set STRAVA_WEBHOOK_VERIFY_TOKEN}
      STRAVA_SCOPES: ${STRAVA_SCOPES:-read,activity:read_all}
      STRAVA_TOKEN_ENCRYPTION_KEY: ${STRAVA_TOKEN_ENCRYPTION_KEY:-}
      STRAVA_HTTP_TIMEOUT_SECONDS: ${STRAVA_HTTP_TIMEOUT_SECONDS:-15}
      STRAVA_SYNC_PER_PAGE: ${STRAVA_SYNC_PER_PAGE:-10}
      STRAVA_SYNC_MAX_PAGES: ${STRAVA_SYNC_MAX_PAGES:-1}
      STRAVA_SYNC_MAX_ACTIVITIES: ${STRAVA_SYNC_MAX_ACTIVITIES:-10}
      ART_JOB_POLL_INTERVAL_MS: ${ART_JOB_POLL_INTERVAL_MS:-3000}
      ART_WORKER_STALE_PROCESSING_MS: ${ART_WORKER_STALE_PROCESSING_MS:-120000}
      ART_WORKER_RETRY_DELAY_MS: ${ART_WORKER_RETRY_DELAY_MS:-120000}
      ART_WORKER_RATE_LIMIT_RETRY_DELAY_MS: ${ART_WORKER_RATE_LIMIT_RETRY_DELAY_MS:-300000}
      ART_ASSET_BASE_URL: ${ART_ASSET_BASE_URL:-}
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-}
      AWS_S3_REGION: ${AWS_S3_REGION:-}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT:-}
      AWS_S3_PUBLIC_BASE_URL: ${AWS_S3_PUBLIC_BASE_URL:-}
      ARK_API_KEY: ${ARK_API_KEY:-}
      ARK_BASE_URL: ${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/v3}
      DOUBAO_SEEDREAM_MODEL: ${DOUBAO_SEEDREAM_MODEL:-doubao-seedream-5-0-260128}
      DOUBAO_IMAGE_SIZE: ${DOUBAO_IMAGE_SIZE:-2K}
      DOUBAO_OUTPUT_FORMAT: ${DOUBAO_OUTPUT_FORMAT:-png}
      DOUBAO_RESPONSE_FORMAT: ${DOUBAO_RESPONSE_FORMAT:-url}
      DOUBAO_REQUEST_TIMEOUT_MS: ${DOUBAO_REQUEST_TIMEOUT_MS:-120000}
    depends_on:
      - postgres

  postgres:
    image: postgres:17-alpine
    container_name: strava-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strava_art_lab}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  frontend:
    image: ${FRONTEND_IMAGE:?set FRONTEND_IMAGE}:${IMAGE_TAG:-master}
    container_name: strava-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      - server

volumes:
  postgres_data:
