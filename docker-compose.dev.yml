services:
  postgres:
    image: postgres:17-alpine
    container_name: strava-art-lab-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strava_art_lab}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-strava_art_lab}"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        VITE_TIANDITU_KEY: ${VITE_TIANDITU_KEY:-}
    container_name: strava-art-lab-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - postgres
